version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edutract_postgres
    environment:
      POSTGRES_USER: edutract_user
      POSTGRES_PASSWORD: edutract_password_secure
      POSTGRES_DB: edutract_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edutract_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edutract_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edutract_redis
    ports:
      - "6379:6379"
    networks:
      - edutract_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutract_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://edutract_user:edutract_password_secure@postgres:5432/edutract_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_here
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edutract_network
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:

networks:
  edutract_network:
    driver: bridge